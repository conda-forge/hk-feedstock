context:
  version: "1.48.0"

package:
  name: hk
  version: ${{ version }}

source:
  url: https://github.com/jdx/hk/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 956937984f48b83226f411f003f9f83da5e5f071922d48d7b8fce0900ede7a86

build:
  number: 0
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
    content:
      - if: unix
        then:
          - export OPENSSL_DIR=${PREFIX}
          - export OPENSSL_NO_VENDOR=1
          - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path .
        else:
          - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path .
      - cargo-bundle-licenses --format yaml --output ./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - if: unix
      then: pkg-config
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - if: unix
      then: openssl

tests:
  - script: hk version

about:
  homepage: https://github.com/jdx/hk
  summary: git hooks and project lints
  description: |
    A git hook manager and project linting tool with an emphasis on performance.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://github.com/jdx/hk
  repository: https://github.com/jdx/hk

extra:
  recipe-maintainers:
    - imagejan
